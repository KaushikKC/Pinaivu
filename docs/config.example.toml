# ~/.deai/config.toml
# Generated by `deai-node init`. Edit as needed.

[node]
node_id   = ""            # auto-populated on first run from libp2p keypair
data_dir  = "~/.deai/data"
log_level = "info"        # trace | debug | info | warn | error

[gpu]
device          = "auto"  # auto | cuda:0 | cuda:1 | metal | cpu
max_vram_usage  = 0.9     # fraction of total VRAM to use (0.0–1.0)
concurrent_jobs = 1       # max parallel inference jobs on this GPU

[inference]
engine              = "ollama"       # ollama | vllm
default_model       = "llama3.1:8b"
max_context_length  = 8192
max_output_tokens   = 4096
temperature_default = 0.7

[network]
listen_port  = 4001
bootstrap_nodes = [
  "/dns4/seed1.deai.network/tcp/4001/p2p/QmPlaceholder1",
  "/dns4/seed2.deai.network/tcp/4001/p2p/QmPlaceholder2",
]
max_peers     = 50
nat_traversal = true

[pricing]
price_per_1k_tokens = 10     # NanoX per 1 000 output tokens
min_escrow          = 100    # NanoX
auto_pricing        = false  # let node choose competitive price automatically

[wallet]
address  = ""                       # Sui wallet address
keystore = "~/.deai/wallet.enc"     # AES-encrypted keystore

[privacy]
memory_wipe = true   # zero plaintext from RAM after each job
tee_enabled = false  # set true if running inside an SGX/TDX enclave

[health]
metrics_port       = 9090
heartbeat_interval = "30s"

[updates]
auto_update    = true
update_channel = "stable"   # stable | beta | nightly
